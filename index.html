<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crédito Consignado · Servidores de Palmas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--green:#1D9E75;--green-light:#E1F5EE;--green-mid:#9FE1CB;--green-text:#085041;--wa-dark:#075E54;--wa-green:#25D366;--wa-bg:#ECE5DD;--white:#fff;--gray-100:#f0f0ee;--gray-200:#e0e0dc;--gray-400:#9a9a96;--gray-600:#5a5a56;--gray-900:#1a1a18;--font:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--wa-bg);min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;background:var(--wa-bg)}
.wa-header{background:var(--wa-dark);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:30;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.wa-avatar{width:38px;height:38px;border-radius:50%;background:var(--wa-green);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#fff;flex-shrink:0}
.wa-name{font-size:15px;font-weight:500;color:#fff;line-height:1.2}
.wa-status{font-size:11px;color:#B2DFDB}
.wa-badge{font-size:10px;color:#B2DFDB;text-align:right;line-height:1.4;margin-left:auto}
.chat-body{flex:1;overflow-y:auto;padding:12px 10px 90px;display:flex;flex-direction:column;gap:6px;min-height:500px}
.bubble-in{align-self:flex-start;max-width:82%}
.bubble-out{align-self:flex-end;max-width:78%}
.bubble{padding:8px 12px 6px;border-radius:8px;font-size:14px;line-height:1.6;color:var(--gray-900);word-break:break-word}
.bubble-in .bubble{background:var(--white);border-top-left-radius:2px}
.bubble-out .bubble{background:#DCF8C6;border-top-right-radius:2px}
.bubble strong{font-weight:500}
.bubble-time{font-size:10px;color:var(--gray-400);margin-top:2px}
.bubble-in .bubble-time{text-align:left}
.bubble-out .bubble-time{text-align:right}
.opts{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.opt-btn{padding:9px 12px;background:#E8F5E9;border:0.5px solid #A5D6A7;border-radius:8px;font-size:13px;color:#1B5E20;cursor:pointer;text-align:left;font-family:var(--font);transition:background .15s}
.opt-btn:hover{background:#C8E6C9}
.opt-btn:disabled{opacity:.45;pointer-events:none}
.typing-indicator{display:flex;gap:4px;padding:10px 14px;background:var(--white);border-radius:8px;border-top-left-radius:2px;align-self:flex-start;width:56px}
.typing-indicator span{width:8px;height:8px;background:#aaa;border-radius:50%;animation:bounce .9s infinite}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.upload-zone{border:1.5px dashed #A5D6A7;border-radius:12px;padding:16px;text-align:center;cursor:pointer;background:var(--white);position:relative;transition:background .2s;margin-top:10px}
.upload-zone:hover{background:#F1F8E9}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.up-icon{font-size:22px;margin-bottom:6px}
.up-title{font-size:14px;font-weight:500;color:#1B5E20}
.up-sub{font-size:12px;color:var(--gray-400);margin-top:3px}
.file-attached{display:none;align-items:center;gap:8px;margin-top:8px;padding:9px 12px;background:#E8F5E9;border:0.5px solid #A5D6A7;border-radius:8px}
.file-attached.show{display:flex}
.fa-icon{width:32px;height:32px;border-radius:6px;background:#A5D6A7;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fa-name{font-size:12px;font-weight:500;color:#1B5E20;word-break:break-all}
.fa-size{font-size:10px;color:var(--gray-400)}
.chat-input-area{background:#F0F0F0;padding:8px 10px;display:flex;align-items:center;gap:8px;position:sticky;bottom:0;z-index:10}
.chat-input{flex:1;height:40px;border-radius:20px;border:none;padding:0 14px;font-size:14px;font-family:var(--font);background:var(--white);outline:none;color:var(--gray-900)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--wa-green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{background:#1DA851}
.success-msg{background:var(--green-light);border:0.5px solid var(--green-mid);border-radius:12px;padding:16px;text-align:center;margin-top:8px}
.s-title{font-size:16px;font-weight:500;color:var(--green-text);margin-bottom:4px}
.s-sub{font-size:13px;color:var(--green-text);opacity:.8;line-height:1.5;margin-bottom:12px}
.wa-cta{display:inline-flex;align-items:center;gap:7px;background:var(--wa-green);color:#fff;padding:11px 20px;border-radius:8px;font-size:14px;font-weight:500;text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <div class="wa-header">
    <div class="wa-avatar">S</div>
    <div style="flex:1">
      <div class="wa-name">Sara · Crédito Consignado</div>
      <div class="wa-status">online agora</div>
    </div>
    <div class="wa-badge">Servidor Municipal<br>Palmas – TO</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column">
    <div class="chat-body" id="chat-body"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chat-input" placeholder="Digite sua resposta..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const SUPA_URL='https://urtzujmnjndynenunhtx.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVydHp1am1uam5keW5lbnVuaHR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzY4MDAsImV4cCI6MjA4OTI1MjgwMH0.RxINh9uF1L8H3XCmyLE6SzfhvpYiy69kTJhINKIeQRg';
const WA='5511945156170';

const flow=[
  {id:'start',text:'Olá! 👋 Sou a *Sara*, consultora de crédito da Prefeitura de Palmas.\n\nVocê é servidor(a) municipal ativo(a) de Palmas – TO?',opts:['✅ Sim, sou servidor(a) ativo(a)','❌ Não sou servidor(a)']},
  {id:'nome',text:'Ótimo! 😊 Para iniciar sua simulação, qual é o seu *nome completo*?',input:true,placeholder:'Digite seu nome completo'},
  {id:'cpf',text:'Perfeito, *{nome}*!\n\nAgora me informe seu *CPF*:',input:true,placeholder:'000.000.000-00',mask:'cpf'},
  {id:'secretaria',text:'Qual é a sua *secretaria ou órgão* na Prefeitura de Palmas?',opts:['📚 Educação','🏥 Saúde','🏛️ Administração e Finanças','🛣️ Infraestrutura','🛡️ Segurança Pública','♻️ Desenvolvimento Social','🔧 Outro órgão']},
  {id:'vinculo',text:'Qual é o seu *tipo de vínculo funcional*?',opts:['📋 Efetivo (concursado)','🪑 Comissionado','📝 Contratado','🎖️ Aposentado / Pensionista']},
  {id:'salario',text:'Qual é o seu *salário bruto* mensal aproximado?',opts:['Até R$ 2.000','R$ 2.001 – R$ 4.000','R$ 4.001 – R$ 6.000','R$ 6.001 – R$ 10.000','Acima de R$ 10.000']},
  {id:'valor',text:'Que *valor de empréstimo* você precisa?',opts:['Até R$ 5.000','R$ 5.001 – R$ 10.000','R$ 10.001 – R$ 20.000','R$ 20.001 – R$ 40.000','Acima de R$ 40.000']},
  {id:'finalidade',text:'Qual é a *finalidade* do empréstimo?',opts:['🏠 Reforma ou casa própria','🚗 Veículo','🎓 Educação / curso','💊 Saúde / tratamento','💳 Quitar dívidas','💰 Reserva de emergência','🔧 Outro']},
  {id:'contracheque',text:'Estamos quase lá! 🎉\n\nPara garantir a *melhor taxa*, envie uma foto ou PDF do seu *contracheque*.\n\nOpcional, mas acelera muito:',upload:true},
  {id:'whatsapp',text:'Por último, me informe seu *WhatsApp* para contato:',input:true,placeholder:'(63) 9 0000-0000'},
  {id:'fim',final:true}
];

let step=0,answers={},uploadedDataUrl=null,uploadedType=null,uploadedName=null,chatBlocked=false;

function now(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
function fmtText(t){return t.replace(/\*(.+?)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>').replace(/\{nome\}/g,answers.nome?answers.nome.split(' ')[0]:'')}
function scrollChat(){const b=document.getElementById('chat-body');b.scrollTop=b.scrollHeight}
function escQ(s){return s.replace(/'/g,"\\'")}

function addBubble(html,side){return new Promise(res=>{setTimeout(()=>{const w=document.createElement('div');w.className=side==='in'?'bubble-in':'bubble-out';w.innerHTML=`<div class="bubble">${html}</div><div class="bubble-time">${now()}</div>`;document.getElementById('chat-body').appendChild(w);scrollChat();res();},0);})}
function showTyping(d=1100){return new Promise(res=>{const el=document.createElement('div');el.className='bubble-in';el.id='typing';el.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';document.getElementById('chat-body').appendChild(el);scrollChat();setTimeout(()=>{const t=document.getElementById('typing');if(t)t.remove();res();},d);})}

async function renderStep(s){
  chatBlocked=true;const node=flow[s];if(!node)return;
  if(node.final){await finalize();return;}
  await showTyping();
  if(node.upload){
    await addBubble(`${fmtText(node.text)}<div class="upload-zone"><input type="file" id="file-input" accept="image/*,.pdf" onchange="handleFile(this)"><div class="up-icon">📎</div><div class="up-title">Toque aqui para enviar</div><div class="up-sub">Foto ou PDF · máx. 10MB</div></div><div class="file-attached" id="file-attached"><div class="fa-icon">📄</div><div><div class="fa-name" id="fa-name"></div><div class="fa-size" id="fa-size"></div></div></div><div class="opts" style="margin-top:10px"><button class="opt-btn" id="btn-confirmar" style="display:none" onclick="confirmUpload()">✅ Confirmar envio</button><button class="opt-btn" onclick="skipUpload()">⏭️ Pular por agora</button></div>`,'in');
    chatBlocked=false;return;
  }
  if(node.opts){await addBubble(fmtText(node.text)+`<div class="opts">${node.opts.map((o,i)=>`<button class="opt-btn" data-step="${s}" onclick="chooseOpt('${escQ(o)}',${s},${i})">${o}</button>`).join('')}</div>`,'in');chatBlocked=false;return;}
  if(node.input){await addBubble(fmtText(node.text),'in');const inp=document.getElementById('chat-input');inp.placeholder=node.placeholder||'Digite aqui...';inp.disabled=false;inp.focus();chatBlocked=false;return;}
  await addBubble(fmtText(node.text),'in');chatBlocked=false;
}

function chooseOpt(val,si,oi){
  document.querySelectorAll(`[data-step="${si}"]`).forEach(b=>b.disabled=true);
  if(si===0&&oi===1){addBubble(val,'out').then(()=>showTyping(900)).then(()=>addBubble('Entendido! Este crédito é exclusivo para servidores municipais ativos de Palmas. Quando ingressar no serviço público, volte aqui! 😊','in'));return;}
  answers[flow[si].id]=val;addBubble(val,'out').then(()=>{step++;renderStep(step);});
}
function sendMsg(){const inp=document.getElementById('chat-input');const val=inp.value.trim();if(!val||chatBlocked)return;const node=flow[step];if(!node||!node.input)return;let p=val;if(node.mask==='cpf')p=maskCPF(val);answers[node.id]=p;inp.value='';inp.placeholder='Digite sua resposta...';addBubble(p,'out').then(()=>{step++;renderStep(step);});}
function maskCPF(v){v=v.replace(/\D/g,'').slice(0,11);return v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4').replace(/(\d{3})(\d{3})(\d{1,3})$/,'$1.$2.$3').replace(/(\d{3})(\d{1,3})$/,'$1.$2')}
function handleFile(input){const file=input.files[0];if(!file)return;uploadedName=file.name;uploadedType=file.type;document.getElementById('fa-name').textContent=file.name;document.getElementById('fa-size').textContent=(file.size/1024).toFixed(0)+' KB';document.getElementById('file-attached').classList.add('show');document.getElementById('btn-confirmar').style.display='block';const r=new FileReader();r.onload=e=>{uploadedDataUrl=e.target.result;};r.readAsDataURL(file);}
function confirmUpload(){if(!uploadedDataUrl)return;answers.contracheque={dataUrl:uploadedDataUrl,type:uploadedType,name:uploadedName};document.getElementById('btn-confirmar').disabled=true;document.querySelectorAll('#chat-body .opt-btn').forEach(b=>b.disabled=true);addBubble('📎 '+uploadedName+' enviado ✅','out').then(()=>{step++;renderStep(step);});}
function skipUpload(){answers.contracheque=null;document.querySelectorAll('#chat-body .opt-btn').forEach(b=>b.disabled=true);addBubble('⏭️ Pular por agora','out').then(()=>{step++;renderStep(step);});}
function calcMargem(f){const m={'Até R$ 2.000':'600','R$ 2.001 – R$ 4.000':'1.200','R$ 4.001 – R$ 6.000':'1.800','R$ 6.001 – R$ 10.000':'3.000','Acima de R$ 10.000':'4.000+'};return m[f]||'—'}
function buildMsg(l){return`🏛️ *NOVO LEAD – CONSIGNADO PALMAS*\n\n👤 *Nome:* ${l.nome}\n🪪 *CPF:* ${l.cpf}\n📱 *WhatsApp:* ${l.whatsapp||'—'}\n🏢 *Secretaria:* ${l.secretaria}\n📋 *Vínculo:* ${l.vinculo}\n💰 *Salário:* ${l.salario}\n💵 *Valor desejado:* ${l.valor}\n🎯 *Finalidade:* ${l.finalidade}\n📊 *Margem estimada:* R$ ${l.margem}\n📎 *Contracheque:* ${l.contracheque?'Enviado ✅ (ver painel admin)':'Não enviado'}\n🕐 *Data/hora:* ${new Date().toLocaleString('pt-BR')}\n\n_Lead capturado via SDR Consignado Palmas_`}

async function salvarSupabase(lead){
  try{
    const body={
      nome:lead.nome,cpf:lead.cpf,whatsapp:lead.whatsapp||null,
      secretaria:lead.secretaria,vinculo:lead.vinculo,salario:lead.salario,
      valor:lead.valor,finalidade:lead.finalidade,margem:lead.margem,
      contracheque_name:lead.contracheque?.name||null,
      contracheque_type:lead.contracheque?.type||null,
      contracheque_data:lead.contracheque?.dataUrl||null
    };
    await fetch(`${SUPA_URL}/rest/v1/leads`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=minimal'},
      body:JSON.stringify(body)
    });
  }catch(e){console.error('Supabase erro:',e);}
}

async function finalize(){
  const margem=calcMargem(answers.salario);
  const lead={nome:answers.nome||'—',cpf:answers.cpf||'—',whatsapp:answers.whatsapp||'—',secretaria:answers.secretaria||'—',vinculo:answers.vinculo||'—',salario:answers.salario||'—',valor:answers.valor||'—',finalidade:answers.finalidade||'—',margem,contracheque:answers.contracheque||null};
  await salvarSupabase(lead);
  const url=`https://wa.me/${WA}?text=${encodeURIComponent(buildMsg(lead))}`;
  const nome=(answers.nome||'').split(' ')[0]||'servidor(a)';
  await showTyping(1200);
  await addBubble(`<strong>${nome}</strong>, sua simulação foi registrada! 🎉<br><br>📊 <strong>Margem estimada disponível:</strong> R$ ${margem}<br><br>Nossa equipe entrará em contato em breve!<br><br><div class="success-msg"><div style="font-size:28px;margin-bottom:8px">✅</div><div class="s-title">Ficha registrada com sucesso!</div><div class="s-sub">Clique abaixo para falar direto com nosso consultor.</div><a class="wa-cta" href="${url}" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.857L0 24l6.335-1.521A11.944 11.944 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.65-.487-5.187-1.341l-.371-.214-3.762.904.938-3.666-.234-.389A9.946 9.946 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg> Falar com consultor agora</a></div>`,'in');
  chatBlocked=false;
}
renderStep(0);
</script>
</body>
</html>
